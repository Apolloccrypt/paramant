<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="5;url=https://paramant.app/">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PARAMANT — Nieuw adres</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.card{background:#1e293b;border:1px solid #334155;border-radius:24px;padding:48px 40px;max-width:440px;width:100%}
.logo{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:8px}
.logo span{color:#14b8a6}
.subtitle{font-size:13px;color:#64748b;margin-bottom:32px;font-family:ui-monospace,monospace}
.msg{font-size:16px;color:#94a3b8;line-height:1.6;margin-bottom:8px}
.new-url{font-size:22px;font-weight:700;color:#14b8a6;margin:20px 0;letter-spacing:-.3px}
.countdown{font-size:13px;color:#475569;margin-bottom:28px;font-family:ui-monospace,monospace}
.btn{display:inline-block;padding:14px 32px;background:#14b8a6;color:#0f172a;font-weight:700;font-size:15px;border-radius:14px;text-decoration:none;transition:background .2s}
.btn:hover{background:#2dd4bf}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#14b8a6;margin-right:8px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">PARA<span>MANT</span></div>
  <div class="subtitle">Post-quantum versleuteld appen</div>
  <div class="msg">PARAMANT is verhuisd naar een nieuw adres.</div>
  <div class="new-url">🔐 paramant.app</div>
  <div class="countdown"><span class="dot"></span>Je wordt automatisch doorgestuurd over <span id="sec">5</span> seconden…</div>
  <a href="https://paramant.app/" class="btn">Ga nu naar paramant.app →</a>
</div>
<script>
let s=5;
const el=document.getElementById('sec');
const t=setInterval(()=>{s--;el.textContent=s;if(s<=0){clearInterval(t);location.href='https://paramant.app/';}},1000);
</script>
</body>
</html>
